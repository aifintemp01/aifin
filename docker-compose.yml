services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # PDFs, markdown, tree JSONs — persist across redeploys
      - uploads_data:/app/pageocr/uploads
      # ChromaDB embeddings — persist across redeploys
      - chroma_data:/app/pageocr/chroma_db
      # SQLite database — persist across redeploys
      - sqlite_data:/app/app/backend

    env_file:
      - .env

    environment:
      # Paths — match Dockerfile ENVs, kept here explicitly for clarity
      PAGEINDEX_DIR: /app/pageocr
      UPLOAD_DIR: /app/pageocr/uploads
      CHROMA_DIR: /app/pageocr/chroma_db
      TESSERACT_PATH: /usr/bin/tesseract
      POPPLER_PATH: ""
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  uploads_data:
  chroma_data:
  sqlite_data: